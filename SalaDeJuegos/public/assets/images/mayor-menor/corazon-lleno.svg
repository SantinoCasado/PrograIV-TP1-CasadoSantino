<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Corazón rojo sólido lleno -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sombra suave -->
  <filter id="shadow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
  </filter>
  
  <!-- Corazón principal -->
  <path d="M24 42c-1.8-1.4-10-6.8-12-10.2C8 26.4 6 22 6 18.5 6 11 11 6 16 6c3 0 6 1.2 8 3.6 2-2.4 5-3.6 8-3.6 5 0 10 5 10 12.5 0 3.5-2 8-6 13.3-2 3.4-10.2 8.8-12 10.2z" 
        fill="url(#heartGradient)" 
        stroke="#c92a2a" 
        stroke-width="0.5"
        filter="url(#shadow)"/>
  
  <!-- Brillo superior -->
  <ellipse cx="18" cy="16" rx="4" ry="6" fill="rgba(255,255,255,0.3)"/>
</svg>