<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Corazón roto / dañado -->
  <defs>
    <linearGradient id="brokenHeartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sombra -->
  <filter id="shadowBroken">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
  </filter>
  
  <!-- Contorno del corazón roto (línea punteada) -->
  <path d="M24 42c-1.8-1.4-10-6.8-12-10.2C8 26.4 6 22 6 18.5 6 11 11 6 16 6c3 0 6 1.2 8 3.6 2-2.4 5-3.6 8-3.6 5 0 10 5 10 12.5 0 3.5-2 8-6 13.3-2 3.4-10.2 8.8-12 10.2z" 
        fill="none" 
        stroke="url(#brokenHeartGradient)" 
        stroke-width="1.5"
        stroke-dasharray="3,2"
        opacity="0.7"
        filter="url(#shadowBroken)"/>
  
  <!-- Línea de fractura diagonal -->
  <line x1="10" y1="32" x2="38" y2="8" 
        stroke="#7f8c8d" 
        stroke-width="2" 
        opacity="0.5"
        stroke-dasharray="2,2"/>
  
  <!-- Segunda línea de fractura -->
  <line x1="15" y1="24" x2="32" y2="18" 
        stroke="#7f8c8d" 
        stroke-width="1.5" 
        opacity="0.4"
        stroke-dasharray="2,2"/>
  
  <!-- Pequeños fragmentos (grietas) -->
  <circle cx="20" cy="20" r="1.5" fill="#7f8c8d" opacity="0.6"/>
  <circle cx="28" cy="22" r="1" fill="#7f8c8d" opacity="0.5"/>
  <circle cx="25" cy="28" r="1.2" fill="#7f8c8d" opacity="0.55"/>
</svg>