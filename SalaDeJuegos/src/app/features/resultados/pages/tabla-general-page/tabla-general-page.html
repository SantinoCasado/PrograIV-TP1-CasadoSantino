@if (auth.usuario()) {
  <div class="resultados-layout">
    <app-sidebar-menu seccionActiva="tabla"></app-sidebar-menu>

    <main class="resultados-main">
      <section class="container py-4">
        <h1 class="mb-4">Tabla General</h1>

        @if (cargando()) {
          <p>Cargando rankings...</p>
        }

        <app-tabla-general
          [emailActual]="emailActual()"
          [topAhorcado]="topAhorcado()"
          [topMayorMenor]="topMayorMenor()"
          [topPreguntados]="topPreguntados()"
          [topBuscaMinas]="topBuscaMinas()"
          [topGlobal]="topGlobal()"
        ></app-tabla-general>
      </section>
    </main>
  </div>
} @else if (auth.sesionRestaurada()) {
  <div class="bloqueo-overlay" role="dialog" aria-modal="true" aria-labelledby="titulo-bloqueo">
    <div class="bloqueo-card">
      <h2 id="titulo-bloqueo">Requerís iniciar sesión</h2>
      <p>Requerís estar logueado para acceder a la tabla general de estadísticas.</p>
      <a routerLink="/log-in" class="bloqueo-link">Iniciar sesión</a>
    </div>
  </div>
}
